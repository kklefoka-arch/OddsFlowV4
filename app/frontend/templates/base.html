<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OddsFlow V3{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <div class="nav-left">
                <span class="nav-logo">ODDSFLOW <span class="nav-logo-v3">V3</span></span>
                <div class="nav-links">
                    <a href="/foundation"  class="nav-link {% block nav_foundation %}{% endblock %}">Foundation</a>
                    <a href="/inspector"   class="nav-link {% block nav_inspector %}{% endblock %}">Inspector</a>
                    <a href="/fixtures"    class="nav-link {% block nav_fixtures %}{% endblock %}">Fixtures</a>
                    <a href="/picks"       class="nav-link {% block nav_picks %}{% endblock %}">Picks</a>
                </div>
            </div>
            <div class="nav-right">
                <span class="nav-operator">
                    <span class="nav-operator-dot"></span>
                    OPERATOR
                </span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Settle Modal -->
    <div id="settle-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">SETTLE FIXTURE</span>
                <button class="modal-close" id="settle-close">&#10005;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="settle-fixture-id">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">HOME GOALS</label>
                        <input class="form-input" type="number" min="0" id="settle-home" placeholder="2">
                    </div>
                    <div class="form-group">
                        <label class="form-label">AWAY GOALS</label>
                        <input class="form-input" type="number" min="0" id="settle-away" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">HOME CRN</label>
                        <input class="form-input" type="number" min="0" id="settle-hc" placeholder="5">
                    </div>
                    <div class="form-group">
                        <label class="form-label">AWAY CRN</label>
                        <input class="form-input" type="number" min="0" id="settle-ac" placeholder="4">
                    </div>
                </div>
                <div id="settle-msg" class="ingest-msg hidden"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="settle-submit">CONFIRM RESULT</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
